services:

  mysql:
    container_name: mysql_container
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobapp_db
      MYSQL_USER: codexazhar
      MYSQL_PASSWORD: codexazhar
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - mysql
    restart: unless-stopped

  phpmyadmin:
    container_name: phpmyadmin_container
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "5050:80"
    networks:
      - mysql
    restart: unless-stopped

  zipkin:
    container_name: jobapp_zipkin_container
    image: openzipkin/zipkin
    ports:
      - "9412:9411"
    networks:
      - mysql
    restart: unless-stopped


networks:
  mysql:
    driver: bridge

volumes:
  mysql: